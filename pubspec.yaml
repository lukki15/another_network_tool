name: another_network_tool
description: "Scan all devices in your network."
publish_to: 'none'
version: 0.3.0

repository: https://github.com/lukki15/another_network_tool
issue_tracker: https://github.com/lukki15/another_network_tool/pulls
documentation: https://lukki15.github.io/another_network_tool/

platforms:
  android:
  linux:

environment:
  sdk: ^3.8.1

dependencies:
  connectivity_plus: ^7.1.1
  dart_ping: ^9.0.1
  flutter:
    sdk: flutter
  forui: ^0.21.3
  network_info_plus: ^8.1.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5
  synchronized: ^3.4.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.14.1
  flutter_lints: ^6.0.0
  icons_launcher: ^3.1.0
  mockito: ^5.6.4
  package_rename: ^1.10.1

flutter:
  licenses:
      - LICENSE
  uses-material-design: true
