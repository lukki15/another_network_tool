name: another_network_tool
description: "Scan all devices in your network."
publish_to: 'none'
version: 0.3.0

repository: https://github.com/lukki15/another_network_tool
issue_tracker: https://github.com/lukki15/another_network_tool/pulls
documentation: https://lukki15.github.io/another_network_tool/

platforms:
  android:
  linux:

environment:
  sdk: ^3.8.1

dependencies:
  connectivity_plus: ^7.0.0
  flutter:
    sdk: flutter
  forui: ^0.20.0
  network_info_plus: ^7.0.0
  network_tools: ^5.0.6
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  icons_launcher: ^3.0.3
  mockito: ^5.6.3
  package_rename: ^1.10.1

flutter:
  licenses:
      - LICENSE
  assets:
    - assets/network_tools/mac-vendors-export.csv
  uses-material-design: true
